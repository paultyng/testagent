name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: go.mod
      # Node (and therefore npx) is required by the stdio MCP e2e test
      # in mcp_stdio_e2e_test.go, which spawns
      # @modelcontextprotocol/server-everything via npx. GitHub runners
      # ship Node by default but pinning ensures consistent behavior.
      # The test self-skips when npx is absent, so this step is
      # belt-and-suspenders.
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
      # Pre-install the reference MCP server so npx in
      # mcp_stdio_e2e_test.go hits the global install rather than
      # downloading on first use. Windows npm is ~3-5x slower than
      # Linux for cold installs; without this step the per-test ctx
      # timeout in cursor's `mcp list-tools` would have to be sized
      # for the worst case (~60-90s) instead of the steady-state
      # case (~1-2s).
      - run: npm install -g @modelcontextprotocol/server-everything
      - run: go build ./...
      # -v surfaces per-test PASS/SKIP lines so the e2e tests (notably
      # TestE2E_Cursor_MCPListTools_StdioServerEverything) are visible
      # in the CI log — silent skips on a misconfigured runner would
      # otherwise just look like a fast green run.
      - run: go test -v ./...
