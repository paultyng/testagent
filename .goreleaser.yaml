# See RELEASING.md for the full cut-a-release runbook.
version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: testagent
    binary: testagent
    main: .
    ldflags:
      - -s -w -X main.version={{.Version}}
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - id: default
    ids: [testagent]
    formats: [tar.gz]
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - COMPATIBILITY.md
      - RELEASING.md
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

source:
  enabled: true
  name_template: "{{ .ProjectName }}_{{ .Version }}_source"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: paultyng
    name: testagent
  draft: false
  prerelease: auto
